---

- name: "Bootstrap Ansible requirements"
  hosts: all

  vars:
    galaxy_collections:
      - name: "ansible.posix"
      - name: "community.crypto"
      - name: "community.general"
      - name: "devsec.hardening"
    _xdg_session_type: "{{ ansible_facts['env']['XDG_SESSION_TYPE'] | default('tty') }}"
    _xdg_desktop: "{{ ansible_facts['env']['XDG_CURRENT_DESKTOP'] | default('') }}"
    _distro: "{{ ansible_facts['distribution'] }}"
    _id_like: "{{ cmd_sed_os_release['stdout'] | default('') }}"
    config_yml: "{{ ansible_facts['user_gecos'] }}/.config/dotfiles.yml"
    config_globals:
      homebrew_prefix:
        Linux: "/home/linuxbrew/.linuxbrew"
        Darwin: "/opt/homebrew"
      email: "{{ ansible_facts['user_id'] }}@{{ ansible_facts['hostname'] }}"
      is_desktop: "{{ _xdg_session_type != 'tty' or _distro == 'MacOSX' }}"
      desktop_environment: "{{ _xdg_desktop | lower }}"
      id_like: "{{ _id_like | split(' ') | first | lower }}"

  tasks:
    - name: "Install Ansible Galaxy requirements"
      community.general.ansible_galaxy_install:
        name: "{{ item['name'] }}"
        type: "{{ item['type'] | default('collection') }}"
        force: true
      loop: "{{ galaxy_collections }}"
      tags: [collections]

    - name: "Check if config already exists"
      ansible.builtin.stat:
        path: "{{ config_yml }}"
      register: stat_config_yml
      tags: [config]

    - name: "Skip remaining tasks if config exist"
      when: stat_config_yml['stat']['exists']
      ansible.builtin.meta: end_play

    - name: "Get ID_LIKE in /etc/os-release"
      ansible.builtin.command:
        cmd: "sed -En 's/^ID_LIKE=(.*)/\1/p' /etc/os-release"
      register: cmd_sed_os_release
      when: ansible['system'] == "Linux"

    - name: "Template config file"
      ansible.builtin.template:
        src: "config.yml.j2"
        dest: "{{ config_yml }}"
        mode: "0644"
      tags: [config]

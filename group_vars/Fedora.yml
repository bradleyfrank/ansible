    - fzf
    - gcc-c++
    - ghostscript
    - glow
    - gron
    - hadolint
    - htop
    - httpie
    - iftop
    - inxi
    - jq
    - jo
    - lame
    - libmp4v2
    - libvirt-client
    - mkvtoolnix
    - moreutils
    - msmtp
